<style>
  /* Wrapper Utama Navbar */
  .premium-nav-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    transition: background-color 0.5s ease, backdrop-filter 0.5s ease, padding 0.5s ease;
    padding: 24px 5%;
    box-sizing: border-box;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  /* Efek Glassmorphism saat scroll */
  .premium-nav-wrapper.scrolled {
    background-color: rgba(15, 15, 15, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 16px 5%;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  .premium-logo img {
    height: 28px;
    display: block;
    position: relative;
    z-index: 10001;
  }
  
  /* Menu Desktop */
  .premium-desktop-menu {
    display: flex;
    gap: 40px;
    align-items: center;
  }
  .premium-nav-link {
    color: #ffffff;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    transition: opacity 0.3s ease;
  }
  .premium-nav-link:hover {
    opacity: 0.6;
  }

  /* Tombol Hamburger Mobile */
  .premium-burger-btn {
    display: none;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    width: 48px;
    height: 48px;
    cursor: pointer;
    z-index: 10001; /* Selalu di atas overlay */
    position: relative;
    transition: transform 0.4s ease, border-color 0.4s ease;
  }
  .premium-burger-btn:hover {
    transform: scale(1.05);
    border-color: rgba(255, 255, 255, 0.8);
  }
  .burger-lines {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 12px;
  }
  .burger-line {
    position: absolute;
    right: 0;
    height: 1.5px;
    background-color: #fff;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), width 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
  }
  .burger-line.top { top: 0; width: 100%; }
  .burger-line.middle { top: 5.25px; width: 100%; }
  .burger-line.bottom { top: 10.5px; width: 60%; }
  .premium-burger-btn:hover .burger-line.bottom { width: 100%; }

  /* Animasi Transisi Hamburger Terbuka */
  .premium-burger-btn.open .burger-line.top { transform: translateY(5.25px) rotate(45deg); }
  .premium-burger-btn.open .burger-line.middle { opacity: 0; transform: translateX(-10px); }
  .premium-burger-btn.open .burger-line.bottom { width: 100%; transform: translateY(-5.25px) rotate(-45deg); }

  /* Overlay Menu Full-screen */
  .premium-mobile-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .premium-mobile-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .premium-mobile-link {
    color: #ffffff;
    text-decoration: none;
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    transform: translateY(30px);
    opacity: 0;
    transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.6s ease;
  }
  .premium-mobile-overlay.open .premium-mobile-link {
    transform: translateY(0);
    opacity: 1;
  }
  .premium-mobile-overlay.open .premium-mobile-link:nth-child(1) { transition-delay: 0.1s; }
  .premium-mobile-overlay.open .premium-mobile-link:nth-child(2) { transition-delay: 0.2s; }
  .premium-mobile-overlay.open .premium-mobile-link:nth-child(3) { transition-delay: 0.3s; }

  /* Responsive */
  @media (max-width: 991px) {
    .premium-desktop-menu { display: none; }
    .premium-burger-btn { display: block; }
  }
</style>

<nav class="premium-nav-wrapper" id="premium-navbar">
  <a href="/" class="premium-logo">
    <img src="https://cdn.prod.website-files.com/69cca11c8521d6490c4a5292/69cca15c79900bbbfe8c2ee3_Logotype%20White%20BERKA.svg" alt="Studio BERKA">
  </a>
  
  <!-- Tampilan Desktop -->
  <div class="premium-desktop-menu">
    <a href="#top" class="premium-nav-link">Beranda</a>
    <a href="#portofolio" class="premium-nav-link">Portofolio</a>
    <a href="#ratecard" class="premium-nav-link">Ratecard</a>
  </div>

  <!-- Tombol Tampilan Mobile -->
  <button class="premium-burger-btn" id="premium-burger" aria-label="Menu">
    <div class="burger-lines">
      <div class="burger-line top"></div>
      <div class="burger-line middle"></div>
      <div class="burger-line bottom"></div>
    </div>
  </button>
</nav>

<!-- Overlay Layar Penuh -->
<div class="premium-mobile-overlay" id="premium-overlay">
  <a href="#top" class="premium-mobile-link close-on-click">Beranda</a>
  <a href="#portofolio" class="premium-mobile-link close-on-click">Portofolio</a>
  <a href="#ratecard" class="premium-mobile-link close-on-click">Ratecard</a>
</div>

<script>
  (function() {
    const navbar = document.getElementById('premium-navbar');
    const burger = document.getElementById('premium-burger');
    const overlay = document.getElementById('premium-overlay');
    const mobileLinks = document.querySelectorAll('.close-on-click');

    // Deteksi Scroll untuk efek Glassmorphism
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });

    // Logika buka-tutup Menu
    function toggleMenu() {
      burger.classList.toggle('open');
      overlay.classList.toggle('open');
      // Mencegah scroll di background saat menu fullscreen terbuka
      document.body.style.overflow = overlay.classList.contains('open') ? 'hidden' : '';
    }

    burger.addEventListener('click', toggleMenu);

    // Tutup menu saat menekan link navigasi
    mobileLinks.forEach(link => {
      link.addEventListener('click', () => {
        if (overlay.classList.contains('open')) {
          toggleMenu();
        }
      });
    });
  })();
</script>
